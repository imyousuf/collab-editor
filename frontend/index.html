<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collaborative Editor Demo</title>
  <script type="module" src="/src/multi-editor.ts"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: #fafafa; }
    h1 { margin: 0 0 16px; font-size: 24px; }
    .doc-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    .doc-bar label { font-size: 14px; color: #555; }
    .doc-bar select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    multi-editor {
      display: block;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>Collaborative Editor</h1>
  <div class="doc-bar">
    <label for="doc-select">Document:</label>
    <select id="doc-select" autocomplete="off"></select>
  </div>

  <multi-editor
    id="editor"
    mode="wysiwyg"
    placeholder="Start writing..."
    theme="light"
  ></multi-editor>

  <script type="module">
    const editor = document.getElementById('editor');
    const docSelect = document.getElementById('doc-select');

    const userName = 'User-' + Math.floor(Math.random() * 1000);
    const userColor = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');

    // Store MIME types from the document list API
    const docMimeTypes = {};
    let currentRoom = null;

    async function connectToRoom(roomName) {
      if (currentRoom === roomName) return;
      currentRoom = roomName;

      // Fetch content
      let content = '';
      let mimeType = docMimeTypes[roomName] || 'text/plain';
      try {
        const resp = await fetch('/api/documents/load?path=' + encodeURIComponent(roomName), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        });
        if (resp.ok) {
          const data = await resp.json();
          mimeType = data.mime_type || mimeType;
          content = data.content || '';
        }
      } catch (e) {
        console.warn('Failed to load document:', e);
      }

      // Configure all at once — prevents multiple reinitialize cycles
      await editor.configure({
        mimeType,
        collaboration: {
          enabled: true,
          roomName: roomName,
          providerUrl: location.protocol === 'https:' ? 'wss://' + location.host + '/ws' : 'ws://' + location.host + '/ws',
          user: { name: userName, color: userColor },
        },
        initialContent: content,
      });
    }

    async function loadDocumentList() {
      try {
        const resp = await fetch('/api/documents');
        if (!resp.ok) throw new Error(`${resp.status}`);
        const data = await resp.json();
        docSelect.innerHTML = '';
        if (data.documents && data.documents.length > 0) {
          for (const doc of data.documents) {
            docMimeTypes[doc.name] = doc.mime_type;
            const opt = document.createElement('option');
            opt.value = doc.name;
            opt.textContent = doc.name;
            docSelect.appendChild(opt);
          }
          await connectToRoom(docSelect.value);
          documentListLoaded = true;
        } else {
          const opt = document.createElement('option');
          opt.value = 'untitled';
          opt.textContent = 'untitled';
          docSelect.appendChild(opt);
          connectToRoom('untitled');
        }
      } catch (e) {
        console.warn('Failed to load document list, using default:', e);
        const opt = document.createElement('option');
        opt.value = 'untitled';
        opt.textContent = 'untitled';
        docSelect.appendChild(opt);
        connectToRoom('untitled');
      }
    }

    // Load document list once the custom element is defined
    customElements.whenDefined('multi-editor').then(() => loadDocumentList());

    let documentListLoaded = false;
    docSelect.addEventListener('change', () => {
      if (!documentListLoaded) return; // Ignore browser form restoration
      currentRoom = null; // Reset so connectToRoom re-runs
      connectToRoom(docSelect.value);
    });

    editor.addEventListener('editor-save', (e) => {
      console.log('Save triggered:', e.detail.value.substring(0, 100) + '...');
    });
  </script>
</body>
</html>
