<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collaborative Editor Demo</title>
  <script type="module" src="/src/multi-editor.ts"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: #fafafa; }
    h1 { margin: 0 0 16px; font-size: 24px; }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover { background: #f0f0f0; }
    .toolbar button.active { background: #333; color: #fff; border-color: #333; }
    .toolbar select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    .status {
      margin-left: auto;
      font-size: 14px;
      padding: 4px 10px;
      border-radius: 12px;
      background: #fee;
      color: #c33;
    }
    .status[data-status="connected"] { background: #efe; color: #3a3; }
    .status[data-status="connecting"] { background: #ffe; color: #a80; }
    multi-editor {
      display: block;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      min-height: 400px;
    }
    .user-info { font-size: 12px; color: #666; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Collaborative Editor</h1>
  <div class="toolbar">
    <button id="btn-alternate" class="active">WYSIWYG</button>
    <button id="btn-source">Source</button>
    <button id="btn-readonly">Toggle Readonly</button>
    <select id="doc-select"></select>
    <span class="status" id="status">Disconnected</span>
  </div>

  <multi-editor
    id="editor"
    mode="wysiwyg"
    format="markdown"
    language="markdown"
    placeholder="Start writing..."
    theme="light"
  ></multi-editor>

  <div class="user-info" id="user-info"></div>

  <script type="module">
    const editor = document.getElementById('editor');
    const status = document.getElementById('status');
    const docSelect = document.getElementById('doc-select');
    const btnAlternate = document.getElementById('btn-alternate');
    const btnSource = document.getElementById('btn-source');
    const btnReadonly = document.getElementById('btn-readonly');
    const userInfo = document.getElementById('user-info');

    const userName = 'User-' + Math.floor(Math.random() * 1000);
    const userColor = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
    userInfo.textContent = `Editing as ${userName}`;

    // Store MIME types from the document list API
    const docMimeTypes = {};

    async function connectToRoom(roomName) {
      // Fetch content from the relay API
      let content = '';
      let mimeType = docMimeTypes[roomName] || 'text/plain';

      try {
        const resp = await fetch('/api/documents/load?path=' + encodeURIComponent(roomName), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        });
        if (resp.ok) {
          const data = await resp.json();
          mimeType = data.mime_type || mimeType;
          content = data.content || '';
        }
      } catch (e) {
        console.warn('Failed to load document:', e);
      }

      // 1. Set MIME type (updates format, language, mode)
      editor.mimeType = mimeType;
      await new Promise(r => setTimeout(r, 100));
      updateAlternateButton();

      // 2. Set collaboration BEFORE content — so yCollab is active
      //    when content is inserted, ensuring it flows into Y.Text
      editor.collaboration = {
        enabled: true,
        roomName: roomName,
        providerUrl: location.protocol === 'https:' ? 'wss://' + location.host + '/ws' : 'ws://' + location.host + '/ws',
        user: { name: userName, color: userColor },
      };

      // 3. Wait for collaboration setup (async WYSIWYG editor creation, yCollab binding)
      await new Promise(r => setTimeout(r, 500));

      // 4. Now set content — flows through yCollab into Y.Text
      if (content) {
        editor.setContent(content, mimeType);
      }
    }

    async function loadDocumentList() {
      try {
        const resp = await fetch('/api/documents');
        if (!resp.ok) throw new Error(`${resp.status}`);
        const data = await resp.json();
        docSelect.innerHTML = '';
        if (data.documents && data.documents.length > 0) {
          for (const doc of data.documents) {
            docMimeTypes[doc.name] = doc.mime_type;
            const opt = document.createElement('option');
            opt.value = doc.name;
            opt.textContent = doc.name;
            docSelect.appendChild(opt);
          }
          connectToRoom(docSelect.value);
        } else {
          // No documents — create empty editor
          const opt = document.createElement('option');
          opt.value = 'untitled';
          opt.textContent = 'untitled';
          docSelect.appendChild(opt);
          connectToRoom('untitled');
        }
      } catch (e) {
        console.warn('Failed to load document list, using default:', e);
        const opt = document.createElement('option');
        opt.value = 'untitled';
        opt.textContent = 'untitled';
        docSelect.appendChild(opt);
        connectToRoom('untitled');
      }
    }

    // Wait for the multi-editor element to be defined and initialized before loading content
    customElements.whenDefined('multi-editor').then(() => {
      // Give the element time to run firstUpdated and create internal editors
      setTimeout(() => loadDocumentList(), 200);
    });

    docSelect.addEventListener('change', () => {
      connectToRoom(docSelect.value);
    });

    function updateAlternateButton() {
      const cap = editor.alternateCapability;
      if (cap === 'wysiwyg') {
        btnAlternate.textContent = 'WYSIWYG';
        btnAlternate.disabled = false;
        btnAlternate.style.opacity = '1';
      } else if (cap === 'preview') {
        btnAlternate.textContent = 'Preview';
        btnAlternate.disabled = false;
        btnAlternate.style.opacity = '1';
      } else {
        btnAlternate.textContent = 'WYSIWYG';
        btnAlternate.disabled = true;
        btnAlternate.style.opacity = '0.4';
      }
      const isAlternateMode = editor.mode === 'wysiwyg' || editor.mode === 'preview';
      btnAlternate.classList.toggle('active', isAlternateMode);
      btnSource.classList.toggle('active', editor.mode === 'source');
    }

    btnAlternate.addEventListener('click', () => {
      const cap = editor.alternateCapability;
      if (cap === 'wysiwyg') {
        editor.switchMode('wysiwyg');
      } else if (cap === 'preview') {
        editor.switchMode('preview');
      }
    });
    btnSource.addEventListener('click', () => {
      editor.switchMode('source');
    });
    btnReadonly.addEventListener('click', () => {
      editor.readonly = !editor.readonly;
    });

    editor.addEventListener('mode-change', () => {
      updateAlternateButton();
    });

    editor.addEventListener('collab-status', (e) => {
      status.textContent = e.detail.status.charAt(0).toUpperCase() + e.detail.status.slice(1);
      status.dataset.status = e.detail.status;
    });

    editor.addEventListener('editor-save', (e) => {
      console.log('Save triggered:', e.detail.value.substring(0, 100) + '...');
    });
  </script>
</body>
</html>
