<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collaborative Editor Demo</title>
  <script type="module" src="/src/multi-editor.ts"></script>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 20px; background: #fafafa; }
    h1 { margin: 0 0 16px; font-size: 24px; }
    multi-editor {
      display: block;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }
  </style>
</head>
<body>
  <h1>Collaborative Editor</h1>

  <div style="margin-bottom: 8px; display: flex; align-items: center; gap: 12px; font-size: 13px;">
    <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
      <input type="checkbox" id="auto-version-toggle" />
      Auto-version (creates a version on every save to storage)
    </label>
    <span id="auto-version-status" style="color: #666;"></span>
  </div>

  <multi-editor
    id="editor"
    mode="wysiwyg"
    placeholder="Start writing..."
    theme="light"
  ></multi-editor>

  <script type="module">
    const editor = document.getElementById('editor');

    const userName = 'User-' + Math.floor(Math.random() * 1000);
    const userColor = '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');

    // Store MIME types from the document list API
    const docMimeTypes = {};
    let currentRoom = null;

    async function connectToRoom(roomName) {
      if (currentRoom === roomName) return;
      currentRoom = roomName;
      editor.currentDocumentId = roomName;

      // Fetch content
      let content = '';
      let mimeType = docMimeTypes[roomName] || 'text/plain';
      try {
        const resp = await fetch('/api/documents/load?path=' + encodeURIComponent(roomName), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}',
        });
        if (resp.ok) {
          const data = await resp.json();
          mimeType = data.mime_type || mimeType;
          content = data.content || '';
        }
      } catch (e) {
        console.warn('Failed to load document:', e);
      }

      await editor.configure({
        mimeType,
        collaboration: {
          enabled: true,
          roomName: roomName,
          providerUrl: location.protocol === 'https:' ? 'wss://' + location.host + '/ws' : 'ws://' + location.host + '/ws',
          user: { name: userName, color: userColor },
        },
        initialContent: content,
      });
    }

    async function loadDocumentList() {
      try {
        const resp = await fetch('/api/documents');
        if (!resp.ok) throw new Error(`${resp.status}`);
        const data = await resp.json();
        if (data.documents && data.documents.length > 0) {
          // Set documents on the editor — renders the built-in document switcher
          editor.documents = data.documents.map(doc => ({
            id: doc.name,
            name: doc.name,
          }));
          for (const doc of data.documents) {
            docMimeTypes[doc.name] = doc.mime_type;
          }
          await connectToRoom(data.documents[0].name);
        } else {
          connectToRoom('untitled');
        }
      } catch (e) {
        console.warn('Failed to load document list, using default:', e);
        connectToRoom('untitled');
      }
    }

    // Load document list once the custom element is defined
    customElements.whenDefined('multi-editor').then(() => loadDocumentList());

    // Listen for document switch from the built-in toolbar
    editor.addEventListener('document-change', (e) => {
      currentRoom = null;
      connectToRoom(e.detail.documentId);
    });

    editor.addEventListener('editor-save', (e) => {
      console.log('Save triggered:', e.detail.value.substring(0, 100) + '...');
    });

    // Auto-version toggle — calls the demo provider's config endpoint
    const autoVersionToggle = document.getElementById('auto-version-toggle');
    const autoVersionStatus = document.getElementById('auto-version-status');

    // Load current auto-version state
    fetch('/config/auto-version')
      .then(r => r.json())
      .then(data => {
        autoVersionToggle.checked = data.enabled;
        autoVersionStatus.textContent = data.enabled ? 'Enabled' : '';
      })
      .catch(() => {});

    autoVersionToggle.addEventListener('change', async () => {
      const enabled = autoVersionToggle.checked;
      try {
        const resp = await fetch('/config/auto-version', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled }),
        });
        if (resp.ok) {
          autoVersionStatus.textContent = enabled ? 'Enabled' : '';
        }
      } catch (e) {
        console.warn('Failed to toggle auto-version:', e);
        autoVersionToggle.checked = !enabled;
      }
    });
  </script>
</body>
</html>
