[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "collab-editor-provider"
version = "0.1.0"
description = "Python SDK for implementing collab-editor storage providers"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "pycrdt>=0.12,<1",
]

[project.optional-dependencies]
fastapi = ["fastapi>=0.100", "uvicorn[standard]>=0.20"]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "fastapi>=0.100",
    "uvicorn[standard]>=0.20",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["collab_editor_provider"]
