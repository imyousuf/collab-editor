server:
  addr: ":8080"
  read_timeout: 5s
  write_timeout: 10s
  shutdown_timeout: 30s

storage:
  provider_url: "http://localhost:8081"
  auth_token: "dev-token"
  load_timeout: 10s
  store_timeout: 5s
  retry:
    max_attempts: 3
    initial_backoff: 100ms
  health_check:
    interval: 10s
    threshold: 3

room:
  flush_debounce: 2s
  flush_max_bytes: 65536
  idle_timeout: 60s
  max_peers_per_room: 50

metrics:
  enabled: true
  addr: ":9090"

log:
  level: "info"
  format: "json"

# CRDT engine: "sidecar" runs canonical yjs in a Node child for
# wire-format parity with the browser; "ygo" uses the in-process Go
# port (kept for bare-metal Go-only deploys without Node).
engine:
  kind: "sidecar"
  sidecar_node_bin: "node"
  sidecar_dir: "/usr/local/share/collab-editor/yjs-engine"
  sidecar_socket: "/tmp/yjs-engine.sock"
  sidecar_ready_timeout: 10s
  sidecar_restart:
    initial_backoff: 200ms
    max_backoff: 10s
    max_restarts_per_minute: 10
